<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlienTerra</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0;
  height:100%;
  background:#04101f;
  font-family: Arial;
  color:white;
}

#map {
  height: 60vh;
  width: 100%;
}

section {
  padding: 20px;
}

.row {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
}

button {
  padding:10px;
  background:#5DCAA5;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2 style="text-align:center;padding:20px;">
  AlienTerra Live Map
</h2>

<div id="map"></div>

<section>
  <div class="row">
    <input id="address" placeholder="Address will auto-fill" readonly />
    <button id="gpsBtn">📍 GPS</button>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================= MAP ================= */
const map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);


/* ================= SUPABASE (YOUR KEYS) ================= */
const supabase = window.supabase.createClient(
  "https://tjvsqawdnvznchsgrvqu.supabase.co",
  "sb_publishable_ppVSsjXXHfKfZrWnzrXthA_yMReoGXo"
);


/* ================= GPS ================= */
let userLat = null;
let userLng = null;

document.getElementById("gpsBtn").onclick = () => {

  navigator.geolocation.getCurrentPosition(async (pos) => {

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    map.setView([userLat, userLng], 12);

    L.marker([userLat, userLng])
      .addTo(map)
      .bindPopup("You are here")
      .openPopup();

    const addr = await reverseGeocode(userLat, userLng);
    document.getElementById("address").value = addr;

  }, (err) => {
    alert("GPS error: " + err.message);
  }, {
    enableHighAccuracy:true
  });
};


/* ================= REVERSE GEOCODE ================= */
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );
    const data = await res.json();
    return data.display_name || "Unknown location";
  } catch (e) {
    return "Unknown location";
  }
}


/* ================= LOAD FROM SUPABASE ================= */
async function loadSightings() {

  const { data, error } = await supabase
    .from("sightings")
    .select("*");

  if (error) {
    console.log("Supabase error:", error);
    return;
  }

  console.log("Loaded sightings:", data);

  data.forEach(s => {
    if (!s.lat || !s.lng) return;

    L.marker([s.lat, s.lng])
      .addTo(map)
      .bindPopup(`
        <b>${s.title || "No title"}</b><br/>
        ${s.description || ""}<br/>
        <small>${s.address || ""}</small>
      `);
  });
}

loadSightings();

</script>

</body>
</html>
