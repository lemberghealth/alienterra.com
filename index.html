<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlienTerra</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;700&family=Space+Mono&display=swap" rel="stylesheet"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#04101f;
  --blue:#185FA5;
  --green:#1D9E75;
  --text:#E6F1FB;
  --muted:#85B7EB;
  --mono:'Space Mono', monospace;
  --sans:'Barlow', sans-serif;
}
html, body {
  overflow: auto;
}
/* FIX: allow scrolling */
html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
  overflow-y: auto;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

/* STAR BACKGROUND */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* HERO */
.hero {
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding: 40px;
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 48px;
  font-weight: 700;
}

.sub {
  margin-top: 10px;
  color: var(--muted);
  max-width: 600px;
  line-height: 1.5;
}

/* CTA BUTTON */
.cta {
  margin-top: 30px;
  padding: 14px 22px;
  border-radius: 10px;
  border: 1px solid var(--green);
  background: rgba(29,158,117,0.15);
  color: var(--text);
  font-family: var(--mono);
  cursor:pointer;
  transition:0.2s;
}

.cta:hover {
  transform: translateY(-2px);
  background: rgba(29,158,117,0.25);
}

/* SECTIONS */
.section {
  min-height: 100vh;
  padding: 80px 40px;
  position: relative;
  z-index: 2;
}

.section h2 {
  font-size: 28px;
  margin-bottom: 20px;
}

/* MAP */
#map {
  height: 60vh;
  border: 1px solid #185FA5;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
}
<!-- MAP SECTION -->
<section id="mapSection" style="height: 100vh; width: 100%; position: relative; z-index: 2;">
  <div id="map" style="height: 100%; width: 100%;"></div>
</section>

<!-- FORM SECTION -->
<section id="formSection" style="min-height: 100vh; padding: 80px 20px; position: relative; z-index: 2;">
  <h2 style="color: var(--text); font-family: var(--sans);">Report a Sighting</h2>

  <form id="sightingForm">
    <input id="title" placeholder="What did you see?" />
    <textarea id="description" placeholder="Describe it..."></textarea>

    <input id="location" placeholder="Location (auto or manual)" />

    <button type="submit">Submit Report</button>
  </form>
</section>
/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 500px;
}

input, textarea {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #2a4d6d;
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

button.submit {
  padding: 12px;
  background: var(--green);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- HERO -->
<div class="hero">
  <h1>Millions look up. Few report what they see.</h1>

  <div class="sub">
    AlienTerra is building the world’s largest registry of unexplained sightings.
    Every report is mapped, tracked, and investigated.
  </div>

  <button class="cta" id="ctaBtn">
    Report a Sighting
  </button>
</div>

<!-- MAP SECTION -->
<div class="section" id="mapSection">
  <h2>Live Global Sightings Map</h2>
  <div id="map"></div>
</div>

<!-- FORM SECTION -->
<div class="section" id="formSection">
  <h2>Report a Sighting</h2>

  <form>
    <input placeholder="Your name"/>
    <input placeholder="Location (or use GPS later)"/>
    <textarea rows="5" placeholder="Describe what you saw..."></textarea>
    <button class="submit">Submit Sighting</button>
  </form>
</div>

<script>
/* CTA SCROLL */
document.getElementById("ctaBtn").addEventListener("click", () => {
  document.getElementById("mapSection")
    .scrollIntoView({ behavior: "smooth" });
});

/* SIMPLE STARFIELD */
const stars = document.querySelector('.stars');

function createStars() {
  for (let i=0;i<120;i++){
    const s = document.createElement("div");
    s.style.position="absolute";
    s.style.width="2px";
    s.style.height="2px";
    s.style.background="white";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.opacity=Math.random();
    stars.appendChild(s);
  }
}
createStars();
</script>

</body>
</html>
