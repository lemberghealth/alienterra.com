<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlienTerra</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  height: 100%;
  margin: 0;
  background: #04101f;
  font-family: Barlow, sans-serif;
  color: white;
}

.hero {
  text-align:center;
  padding:40px;
}

#mapSection {
  height: 65vh;
  padding: 10px;
}

#map {
  height: 100%;
  width: 100%;
  border-radius: 12px;
}

form {
  max-width: 500px;
  margin: auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding: 30px;
}

input, textarea {
  padding:12px;
  border-radius:8px;
  border:1px solid #333;
  background:#00000055;
  color:white;
}

.row {
  display:flex;
  gap:10px;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#5DCAA5;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Millions look up. Few report what they see.</h1>
</div>

<div id="mapSection">
  <div id="map"></div>
</div>

<form id="form">
  <input id="title" placeholder="Title" required />
  <textarea id="desc" placeholder="Description" required></textarea>

  <div class="row">
    <input id="address" placeholder="Address (auto)" readonly />
    <button type="button" id="gps">📍 GPS</button>
  </div>

  <button type="submit">Submit</button>
</form>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================= SAFE INIT ================= */
let map;
let markers = {};
let userLat = null;
let userLng = null;

/* IMPORTANT: do NOT overwrite global supabase */
const supabaseClient = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

/* ================= INIT MAP AFTER LOAD ================= */
window.addEventListener("load", () => {

  map = L.map('map').setView([20,0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 300);

  loadSightings();
});

/* ================= REVERSE GEOCODE ================= */
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );
    const data = await res.json();
    return data?.display_name || "Unknown";
  } catch (e) {
    console.log(e);
    return "Unknown";
  }
}

/* ================= GPS ================= */
document.getElementById("gps").addEventListener("click", () => {

  navigator.geolocation.getCurrentPosition(async (pos) => {

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    map.setView([userLat, userLng], 10);

    L.marker([userLat, userLng])
      .addTo(map)
      .bindPopup("You are here");

    const addr = await reverseGeocode(userLat, userLng);
    document.getElementById("address").value = addr;

  }, (err) => {
    alert("GPS error: " + err.message);
  }, {
    enableHighAccuracy: true
  });
});

/* ================= LOAD ================= */
async function loadSightings() {

  const { data, error } = await supabaseClient
    .from("sightings")
    .select("*")
    .order("created_at", { ascending:false });

  if (error) {
    console.log("Supabase error:", error);
    return;
  }

  data.forEach(addMarker);
}

/* ================= MARKERS ================= */
function addMarker(s) {

  if (!s.lat || !s.lng || markers[s.id]) return;

  const m = L.marker([s.lat, s.lng])
    .addTo(map)
    .bindPopup(`
      <b>${s.title}</b><br/>
      ${s.description || ""}<br/>
      <small>${s.address || ""}</small>
    `);

  markers[s.id] = m;
}

/* ================= INSERT ================= */
async function insert(data) {

  const { error } = await supabaseClient
    .from("sightings")
    .insert([data]);

  if (error) {
    console.log(error);
    alert("Insert failed");
  }
}

/* ================= FORM ================= */
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    title: title.value,
    description: desc.value,
    address: address.value,
    lat: userLat,
    lng: userLng
  };

  await insert(payload);

  alert("Submitted!");

  loadSightings();
});

</script>

</body>
</html>
