<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlienTerra</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;700&family=Space+Mono&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#04101f;
  --text:#E6F1FB;
  --muted:#85B7EB;
  --teal:#5DCAA5;
  --blue:#185FA5;
  --sans:'Barlow', sans-serif;
  --mono:'Space Mono', monospace;
}

html, body {
  height: 100%;
  width: 100%;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
}

.hero {
  min-height: 50vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:40px;
}

.tagline {
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 12px;
}

.cta {
  margin-top: 20px;
  padding: 14px 20px;
  background: var(--teal);
  border:none;
  border-radius: 8px;
  cursor:pointer;
  font-weight:700;
}

#mapSection {
  height: 60vh;
  padding: 20px;
}

#map {
  height: 100%;
  border-radius: 12px;
}

#formSection {
  padding: 60px 20px;
}

form {
  max-width: 520px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input, textarea {
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.35);
  color:white;
}

button {
  padding:12px;
  background: var(--teal);
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.row {
  display:flex;
  gap:10px;
}

.row input {
  flex:1;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Millions look up. Few report what they see.</h1>
  <div class="tagline">AlienTerra — live sightings intelligence network</div>

  <button class="cta" onclick="document.getElementById('mapSection').scrollIntoView({behavior:'smooth'})">
    View Live Map
  </button>
</section>

<!-- MAP -->
<section id="mapSection">
  <div id="map"></div>
</section>

<!-- FORM -->
<section id="formSection">
  <h2>Report a Sighting</h2>

  <form id="sightingForm">
    <input id="title" placeholder="What did you see?" required />
    <textarea id="description" placeholder="Describe it..." required></textarea>

    <!-- GPS + Address -->
    <div class="row">
      <input id="address" placeholder="Location (auto-filled)" readonly />
      <button type="button" id="gpsBtn">📍 GPS</button>
    </div>

    <button type="submit">Submit Report</button>
  </form>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ───────────────── SUPABASE ───────────────── */
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* ───────────────── MAP ───────────────── */
const map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const markers = {};

/* ───────────────── LOAD DATA ───────────────── */
async function loadSightings() {
  const { data, error } = await supabase
    .from('sightings')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) return console.error(error);

  data.forEach(addMarker);
}

/* ───────────────── MARKERS ───────────────── */
function addMarker(s) {
  if (!s.lat || !s.lng || markers[s.id]) return;

  const marker = L.marker([s.lat, s.lng])
    .addTo(map)
    .bindPopup(`
      <b>${s.title}</b><br/>
      ${s.description || ''}<br/>
      <small>${s.address || ''}</small>
    `);

  markers[s.id] = marker;
}

/* ───────────────── INSERT ───────────────── */
async function insertSighting(data) {
  const { error } = await supabase
    .from('sightings')
    .insert([data]);

  if (error) {
    console.error(error);
    alert("Error submitting sighting");
  }
}

/* ───────────────── REVERSE GEOCODE ───────────────── */
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );
    const data = await res.json();
    return data.display_name || "Unknown location";
  } catch {
    return "Unknown location";
  }
}

/* ───────────────── GPS BUTTON ───────────────── */
document.getElementById('gpsBtn').addEventListener('click', async () => {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    window.userLat = pos.coords.latitude;
    window.userLng = pos.coords.longitude;

    map.setView([window.userLat, window.userLng], 10);

    L.marker([window.userLat, window.userLng])
      .addTo(map)
      .bindPopup("You are here");

    const addr = await reverseGeocode(window.userLat, window.userLng);
    document.getElementById('address').value = addr;

  }, (err) => {
    alert("GPS failed: " + err.message);
  });
});

/* ───────────────── FORM SUBMIT ───────────────── */
document.getElementById('sightingForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    address: document.getElementById('address').value,
    lat: window.userLat || null,
    lng: window.userLng || null
  };

  await insertSighting(data);

  alert("Sighting submitted");

  loadSightings();
});

/* ───────────────── REALTIME UPDATES ───────────────── */
supabase
  .channel('live-sightings')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'sightings' },
    (payload) => addMarker(payload.new)
  )
  .subscribe();

/* ───────────────── INIT ───────────────── */
loadSightings();

</script>

</body>
</html>
