<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlienTerra</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;700&family=Space+Mono&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>

:root{
  --bg:#04101f;
  --text:#E6F1FB;
  --muted:#85B7EB;
  --blue:#185FA5;
  --teal:#1D9E75;
  --mono:'Space Mono', monospace;
  --sans:'Barlow', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

/* HERO (your existing section) */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

/* FIX: no more overflow hidden */

/* APP SECTION */
.app{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

/* MAP */
#map{
  height:520px;
  border-radius:16px;
  margin-top:30px;
  border:1px solid rgba(255,255,255,0.1);
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin:30px 0;
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
}

/* FORM */
form{
  display:grid;
  gap:12px;
  margin-top:40px;
}

input, textarea{
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--blue);
  color:white;
  cursor:pointer;
}

button:hover{opacity:0.85;}

.section-title{
  font-size:20px;
  margin-top:30px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Millions look up. Few report what they see.</h1>
    <p style="color:var(--muted);margin-top:10px;">
      AlienTerra is building the world’s largest registry of unexplained sightings.
    </p>
    <button style="margin-top:20px;">Report a Sighting</button>
  </div>
</div>

<!-- APP -->
<div class="app">

<div class="stats">
  <div>14,382 Sightings</div>
  <div>92 Countries</div>
  <div>37 Active Investigations</div>
</div>

<div id="map"></div>

<h2 class="section-title">Report a Sighting</h2>

<form id="form">

<input id="address" placeholder="Enter address"/>

<button type="button" onclick="getGPS()">Use My GPS Location</button>

<input type="datetime-local" id="time"/>

<textarea id="desc" rows="5" placeholder="Describe what you saw"></textarea>

<input type="email" id="email" placeholder="Email (optional)"/>

<input type="hidden" id="lat"/>
<input type="hidden" id="lng"/>

<button type="submit">Submit</button>

</form>

<p id="msg"></p>

</div>

<!-- LIBS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- GOOGLE PLACES -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&libraries=places"></script>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
  "https://tjvsqawdnvznchsgrvqu.supabase.co",
  "sb_publishable_ppVSsjXXHfKfZrWnzrXthA_yMReoGXo"
);

/* MAP */
const map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

const cluster = L.markerClusterGroup();
map.addLayer(cluster);

let heatData = [];

/* LOAD DATA */
async function load(){
  const {data} = await supabase
    .from('sightings')
    .select('*')
    .eq('status','approved');

  data.forEach(r=>{
    const m = L.marker([r.latitude,r.longitude]);
    m.bindPopup(r.description || "Sighting");
    cluster.addLayer(m);

    heatData.push([r.latitude,r.longitude,1]);
  });

  L.heatLayer(heatData,{radius:25}).addTo(map);
}
load();

/* GPS FIXED */
async function getGPS(){

  if(!navigator.geolocation){
    alert("No GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;

    // reverse geocode
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );

    const d = await r.json();

    document.getElementById("address").value =
      d.display_name || "";

    alert("Location captured");

  });

}

/* GOOGLE AUTOCOMPLETE */
const ac = new google.maps.places.Autocomplete(
  document.getElementById("address")
);

/* SUBMIT */
document.getElementById("form").addEventListener("submit",async e=>{
  e.preventDefault();

  await supabase.from("sightings").insert({
    address:document.getElementById("address").value,
    latitude:parseFloat(document.getElementById("lat").value),
    longitude:parseFloat(document.getElementById("lng").value),
    sighting_time:document.getElementById("time").value,
    description:document.getElementById("desc").value,
    email:document.getElementById("email").value,
    status:"pending"
  });

  document.getElementById("msg").innerText="Submitted!";
});

</script>

</body>
</html>
